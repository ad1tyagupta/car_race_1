<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Racing 3D</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="game-container"></div>

    <div id="loading-screen"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; font-family: 'Courier New', monospace; font-size: 24px;">
        LOADING ASSETS...
    </div>

    <div id="ui-layer">
        <div id="hud" class="hidden">
            <div id="pos-counter">Pos: <span id="pos-val">1/6</span></div>
            <div id="lap-counter">Lap: <span id="lap-val">1/3</span></div>
            <div id="speed-meter">Speed: <span id="speed-val">0</span></div>
            <div id="item-box">Item: <span id="item-val">None</span></div>
        </div>

        <div id="main-menu" class="hidden"> <!-- Hidden initially, shown after load -->
            <h1>NEON RACER 3D</h1>
            <p>Select a Track:</p>
            <div id="track-select"></div>
            <p style="margin-top: 30px;">Controls: Arrows/WASD to Drive<br>SPACE for Item</p>
        </div>

        <div id="game-over" class="hidden">
            <h1>RACE FINISHED!</h1>
            <p>Place: <span id="final-place"></span></p>
            <p>Time: <span id="final-time"></span></p>
            <button id="restart-btn">Back to Menu</button>
        </div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>

</html>
